<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltWise - Electricity Consumption Estimator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Dashboard Header -->
        <header class="dashboard">
            <div class="dashboard-content">
                <h1>VoltWise</h1>
                <div class="subtitle" id="location-display">📍 Detecting Location...</div>
                <div class="cost-display">
                    <span class="currency">₹</span>
                    <span id="total-cost">0</span>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Daily</span>
                        <span class="stat-value" id="daily-kwh">0 kWh</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Monthly</span>
                        <span class="stat-value" id="monthly-kwh">0 kWh</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Yearly</span>
                        <span class="stat-value" id="yearly-kwh">0 kWh</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Actionable Insights -->
        <section class="insights" id="insights-container">
            <div class="insight-card hidden" id="insight-box">
                <span class="material-icons-round insight-icon">lightbulb</span>
                <p id="insight-text">Add appliances to get personalized energy-saving tips.</p>
            </div>
        </section>

        <!-- Appliances Grid -->
        <main class="appliances-grid" id="appliances-container">
            <!-- Cards will be generated by app.js -->
        </main>
        
        <footer>
            <p>Calculations based on standard tier-based tariffs.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
